<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ঘরের স্বাদ - Pro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
    /* আগের সিএসএস একই থাকবে, শুধু PDF স্টাইল যোগ করা হয়েছে */
    :root{--bg:#080f18;--card:#0e1c2b;--blue:#3b9eff;--gold:#f0b429;--text:#e2eaf4;}
    body{font-family:sans-serif;background:var(--bg);color:var(--text);max-width:480px;margin:auto;padding:10px;}
    .inp{width:100%;padding:10px;margin:5px 0;background:#132233;border:1px solid #1a3347;color:white;border-radius:8px;}
    .btn{width:100%;padding:12px;margin:5px 0;border-radius:8px;border:none;cursor:pointer;font-weight:bold;}
    .gcard{background:var(--card);padding:15px;margin-bottom:10px;border-radius:12px;}
</style>
</head>
<body>

<div id="content">
    <div style="display:flex;gap:5px;margin-bottom:10px;">
        <button class="btn" onclick="showTab('home')">হোম</button>
        <button class="btn" onclick="showTab('report')">রিপোর্ট/PDF</button>
    </div>

    <div id="tab-report" class="tab" style="display:none;">
        <div class="gcard">
            <h3>PDF রিপোর্ট ডাউনলোড</h3>
            <select id="rep-person-sel" class="inp"><option value="all">সবাই</option></select>
            <input type="month" id="rep-month" class="inp">
            <button class="btn" style="background:var(--blue);" onclick="generatePDF()">📥 PDF ডাউনলোড করুন</button>
        </div>
        <div id="report-preview" style="display:none;background:white;color:black;padding:20px;">
            <h2 id="pdf-title">হিসাব রিপোর্ট</h2>
            <div id="pdf-body"></div>
        </div>
    </div>

    <div id="tab-home" class="tab">
        <div class="gcard">
            <h3>টাকা জমা নিন</h3>
            <select id="pay-person-sel" class="inp"></select>
            <input type="number" id="pay-amt" class="inp" placeholder="টাকার পরিমাণ">
            <input type="date" id="pay-date" class="inp">
            <button class="btn" style="background:var(--gold);" onclick="addPayment()">জমা সেভ করুন</button>
        </div>
    </div>
</div>

<script>
const SB_URL = 'YOUR_URL'; 
const SB_KEY = 'YOUR_KEY';
const supabase = supabase.createClient(SB_URL, SB_KEY);

let persons = [], entries = [], payments = [];

async function loadData() {
    // persons, entries এবং payments সব টেবিল থেকে ডাটা আনুন
    const { data: p } = await supabase.from('persons').select('*');
    const { data: e } = await supabase.from('entries').select('*');
    const { data: pay } = await supabase.from('payments').select('*');
    persons = p || []; entries = e || []; payments = pay || [];
    renderSelects();
}

function renderSelects() {
    const pSel = document.getElementById('rep-person-sel');
    const paySel = document.getElementById('pay-person-sel');
    persons.forEach(p => {
        pSel.innerHTML += `<option value="${p.id}">${p.name}</option>`;
        paySel.innerHTML += `<option value="${p.id}">${p.name}</option>`;
    });
}

async function addPayment() {
    const person_id = document.getElementById('pay-person-sel').value;
    const amount = document.getElementById('pay-amt').value;
    const date = document.getElementById('pay-date').value;
    
    await supabase.from('payments').insert([{ person_id, amount, date }]);
    alert('জমা সফল হয়েছে!');
    loadData();
}

function generatePDF() {
    const pId = document.getElementById('rep-person-sel').value;
    const month = document.getElementById('rep-month').value;
    
    // ডাটা ফিল্টার
    let filteredEntries = entries.filter(e => (!month || e.date.startsWith(month)) && (pId === 'all' || e.person_id == pId));
    let filteredPayments = payments.filter(p => (!month || p.date.startsWith(month)) && (pId === 'all' || p.person_id == pId));

    // HTML তৈরি
    let html = `<table><thead><tr><th>তারিখ</th><th>খাবার</th><th>টাকা</th></tr></thead><tbody>`;
    filteredEntries.forEach(e => {
        html += `<tr><td>${e.date}</td><td>${e.qty}</td><td>${e.amount}</td></tr>`;
    });
    html += `</tbody></table><h3>মোট জমা: ${filteredPayments.reduce((s,p)=>s+Number(p.amount),0)}</h3>`;

    document.getElementById('pdf-body').innerHTML = html;
    
    const element = document.getElementById('pdf-body');
    html2pdf().from(element).save('report.pdf');
}

function showTab(t) {
    document.querySelectorAll('.tab').forEach(x => x.style.display = 'none');
    document.getElementById('tab-'+t).style.display = 'block';
}

loadData();
</script>
</body>
</html>
