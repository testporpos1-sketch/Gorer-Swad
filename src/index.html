<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>ঘরের স্বাদ (Updated)</title>

<!-- 🔧 SUPABASE -->
<script>
const SUPABASE_URL = "https://YOUR_PROJECT.supabase.co";
const SUPABASE_KEY = "YOUR_ANON_KEY";
</script>

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>
<body style="font-family:sans-serif;padding:20px;max-width:600px;margin:auto;">

<h2>🍱 ঘরের স্বাদ (Full System)</h2>

<button onclick="downloadPDFAll()">📄 Full PDF</button>
<button onclick="downloadCSV()">📊 CSV</button>

<hr>

<h3>💰 Payment Add</h3>
<select id="pay-cust"></select>
<input id="pay-amount" type="number" placeholder="Amount">
<button onclick="addPaymentUI()">Add Payment</button>

<hr>

<div id="list"></div>

<script>

// ================= SUPABASE =================
function sbHeaders(){
  return {
    apikey: SUPABASE_KEY,
    Authorization: `Bearer ${SUPABASE_KEY}`,
    "Content-Type":"application/json"
  }
}

async function sbSelect(table){
  let r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?select=*`,{
    headers: sbHeaders()
  });
  return r.json();
}

async function sbInsert(table,data){
  let r = await fetch(`${SUPABASE_URL}/rest/v1/${table}`,{
    method:"POST",
    headers: sbHeaders(),
    body: JSON.stringify(data)
  });
  return r.json();
}

// ================= DATA =================
let customers = [];
let logs = {};
let payments = [];

// ================= LOAD =================
async function loadData(){
  const [c,l,p] = await Promise.all([
    sbSelect("gs_customers"),
    sbSelect("gs_logs"),
    sbSelect("gs_payments")
  ]);

  customers = c;
  payments = p;

  logs = {};
  l.forEach(r=>{
    if(!logs[r.month_key]) logs[r.month_key]={};
    if(!logs[r.month_key][r.customer_id]) logs[r.month_key][r.customer_id]={};
    logs[r.month_key][r.customer_id][r.log_date]=r.qty;
  });

  render();
}

// ================= HELPERS =================
function custMonthDetail(custId,mk){
  let meals=0;
  Object.entries(logs[mk]?.[custId]||{}).forEach(([d,q])=>{
    meals+=q;
  });

  let c = customers.find(x=>x.id===custId);
  let bill = meals*(Number(c.price)||0);

  return {meals,bill};
}

function getPayments(id){
  return payments.filter(p=>p.customer_id===id)
    .reduce((s,p)=>s+Number(p.amount||0),0);
}

function allTime(id){
  let meals=0,bill=0;

  Object.keys(logs).forEach(mk=>{
    let d=custMonthDetail(id,mk);
    meals+=d.meals;
    bill+=d.bill;
  });

  let paid = getPayments(id);
  return {meals,bill,paid,due:bill-paid};
}

// ================= RENDER =================
function render(){

  // dropdown
  document.getElementById("pay-cust").innerHTML =
    customers.map(c=>`<option value="${c.id}">${c.name}</option>`).join("");

  // list
  document.getElementById("list").innerHTML =
    customers.map(c=>{
      let d = allTime(c.id);
      return `
        <div style="border:1px solid #ccc;padding:10px;margin:8px 0">
          <b>${c.name}</b><br>
          Meals: ${d.meals}<br>
          Bill: ${d.bill}<br>
          Paid: ${d.paid}<br>
          Due: ${d.due}
        </div>
      `;
    }).join("");
}

// ================= PAYMENT =================
async function addPaymentUI(){
  let id = document.getElementById("pay-cust").value;
  let amount = document.getElementById("pay-amount").value;

  if(!amount) return alert("amount dao");

  await sbInsert("gs_payments",{
    customer_id:id,
    pay_date:new Date().toISOString().slice(0,10),
    amount:amount
  });

  alert("Saved");
  loadData();
}

// ================= PDF =================
async function downloadPDFAll(){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let y=10;
  doc.text("Full Report",10,y); y+=10;

  customers.forEach((c,i)=>{
    let d = allTime(c.id);

    doc.text(`${i+1}. ${c.name}`,10,y); y+=6;
    doc.text(`Meals:${d.meals} Bill:${d.bill} Paid:${d.paid} Due:${d.due}`,10,y);
    y+=10;

    if(y>270){ doc.addPage(); y=10; }
  });

  doc.save("report.pdf");
}

// ================= CSV =================
function downloadCSV(){
  let csv="Name,Meals,Bill,Paid,Due\n";

  customers.forEach(c=>{
    let d = allTime(c.id);
    csv+=`${c.name},${d.meals},${d.bill},${d.paid},${d.due}\n`;
  });

  let blob=new Blob([csv]);
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="report.csv";
  a.click();
}

// ================= START =================
loadData();

</script>

</body>
</html>
