<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ঘরের স্বাদ - PRO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root{--bg:#080f18;--card:#0e1c2b;--blue:#3b9eff;--gold:#f0b429;--green:#34d399;--text:#e2eaf4;}
        body{font-family:sans-serif;background:var(--bg);color:var(--text);margin:0;padding:15px;}
        .gcard{background:var(--card);padding:15px;border-radius:12px;margin-bottom:10px;border:1px solid #1a3347;}
        .inp{width:100%;padding:12px;margin:5px 0;background:#132233;border:1px solid #1a3347;color:white;border-radius:8px;}
        .btn{padding:12px;margin:5px 0;border-radius:8px;border:none;cursor:pointer;font-weight:bold;width:100%;}
        table{width:100%;border-collapse:collapse;color:white;font-size:12px;}
        th, td{border:1px solid #1a3347;padding:8px;text-align:center;}
    </style>
</head>
<body>

<div id="app">
    <h3>ঘরের স্বাদ - কন্ট্রোল প্যানেল</h3>
    
    <div class="gcard">
        <select id="person-sel" class="inp"></select>
        <input type="number" id="val" class="inp" placeholder="সংখ্যা বা টাকা">
        <input type="date" id="date" class="inp">
        <div style="display:flex; gap:5px;">
            <button class="btn" style="background:var(--blue)" onclick="addEntry()">খাবার যোগ</button>
            <button class="btn" style="background:var(--green)" onclick="addPayment()">টাকা জমা</button>
        </div>
    </div>

    <div class="gcard">
        <button class="btn" style="background:var(--gold)" onclick="generatePDF()">📥 PDF ডাউনলোড</button>
        <button class="btn" style="background:var(--blue)" onclick="exportCSV()">📊 Google Sheets (CSV)</button>
    </div>

    <div id="report-table" class="gcard"></div>
</div>

<script>
const supabase = supabase.createClient('https://tsmpceurtrsfrobplqvj.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRzbXBjZXVydHJzZnJvYnBscXZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMjk4MTIsImV4cCI6MjA5MDcwNTgxMn0.YM3APMc-8aY2ZTGOwRR-6JQP6_z8BdMl-YYjaG4ysJQ');

// ডাটা লোড
async function loadAll() {
    const { data: p } = await supabase.from('persons').select('*');
    const { data: e } = await supabase.from('entries').select('*');
    const { data: pay } = await supabase.from('payments').select('*');
    render(p, e, pay);
}

// খাবার যোগ
async function addEntry() {
    const pId = document.getElementById('person-sel').value;
    const qty = document.getElementById('val').value;
    const date = document.getElementById('date').value;
    await supabase.from('entries').insert([{ id: Date.now().toString(), person_id: pId, qty, date }]);
    loadAll();
}

// টাকা জমা
async function addPayment() {
    const pId = document.getElementById('person-sel').value;
    const amt = document.getElementById('val').value;
    const date = document.getElementById('date').value;
    await supabase.from('payments').insert([{ id: Date.now().toString(), person_id: pId, amount: amt, date }]);
    loadAll();
}

// PDF জেনারেশন
function generatePDF() {
    const element = document.getElementById('report-table');
    html2pdf().from(element).save('report.pdf');
}

// Google Sheets / CSV এক্সপোর্ট
function exportCSV() {
    let csv = "তারিখ,নাম,খাবার,টাকা\n";
    // এখানে আপনার ডাটা লুপ করে CSV ফরম্যাট তৈরি করুন
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'hishab.csv'; a.click();
}

function render(p, e, pay) {
    let html = `<table><tr><th>তারিখ</th><th>খাবার</th><th>জমা</th></tr>`;
    e.forEach(i => html += `<tr><td>${i.date}</td><td>${i.qty}</td><td>-</td></tr>`);
    pay.forEach(i => html += `<tr><td>${i.date}</td><td>-</td><td>${i.amount}</td></tr>`);
    html += `</table>`;
    document.getElementById('report-table').innerHTML = html;
}

document.getElementById('date').value = new Date().toISOString().slice(0,10);
loadAll();
</script>
</body>
</html>
